name: Build and Push Monitoring Dashboard Images

on:
  workflow_dispatch:
  push:
    branches:
      - release-*
      - draft-*

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine environment and image tag
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref_name }}" == release-* ]]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging-${VERSION}-${SHORT_SHA}" >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values-staging.yaml" >> $GITHUB_ENV
            echo "VITE_API_BASE_URL=https://preprod-workbench.ondc.tech/monitoring-api" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=dev-${VERSION}-${SHORT_SHA}" >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values.yaml" >> $GITHUB_ENV
            echo "VITE_API_BASE_URL=https://dev-workbench.ondc.tech/monitoring-api" >> $GITHUB_ENV
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/ondc-official/automation-monitoring-dashboard/backend:${{ env.IMAGE_TAG }}
            ghcr.io/ondc-official/automation-monitoring-dashboard/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/ondc-official/automation-monitoring-dashboard/frontend:${{ env.IMAGE_TAG }}
            ghcr.io/ondc-official/automation-monitoring-dashboard/frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_AUTH_USERNAME=admin
            VITE_AUTH_PASSWORD=${{ secrets.MONITORING_DASHBOARD_AUTH_PASSWORD }}
            VITE_BASE_URL=/monitoring
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update image tags in Helm values file
        run: |
          python3 << 'PYEOF'
          import re, os

          target = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']
          sections = {'monitoringDashboardBackend', 'monitoringDashboardFrontend'}

          with open(target, 'r') as f:
              lines = f.readlines()

          current_section = None
          result = []
          for line in lines:
              if re.match(r'^[a-zA-Z]', line):
                  key = line.split(':')[0].strip()
                  current_section = key if key in sections else None
              if current_section and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)
          PYEOF
        env:
          TARGET_FILE: ${{ env.TARGET_FILE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push tag update to automation-iac
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.TARGET_FILE }}"
          git commit -m "chore(${{ env.ENVIRONMENT }}): automation-monitoring-dashboard -> ${{ env.IMAGE_TAG }}"
          git push
