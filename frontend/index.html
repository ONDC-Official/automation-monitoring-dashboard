<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var isDark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://s3-ap-south-1.amazonaws.com/ondc-static-website-media/ondc-website-media/2023/07/fav-2.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONDC | Monitoring Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
